<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacto</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <nav class="navbar dark">
    <a class="brand" href="index.html">🍽 Restaurante Delicioso</a>
    <div class="nav-links show">
      <a href="index.html">Inicio</a>
      <a href="pedido.html">Pedido</a>
    </div>
  </nav>

  <main class="section contact-grid">
    <div>
      <h1>Contacto</h1>
      <p>Estamos listos para atenderte.</p>
      <p><strong>Dirección:</strong> Calle Gourmet 123, Ciudad Sabor</p>
      <p><strong>Teléfono:</strong> 55 1234 5678</p>
      <p><strong>Email:</strong> contacto@restaurantedelicioso.com</p>
      <p><strong>Horario:</strong> Lunes a domingo, 1:00 pm a 10:00 pm</p>
    </div>

    <form class="form-card">
      <label>Nombre</label>
      <input type="text" placeholder="Tu nombre" />
      <label>Correo</label>
      <input type="email" placeholder="tu@email.com" />
      <label>Mensaje</label>
      <textarea rows="5" placeholder="Escribe tu mensaje"></textarea>
      <button class="btn" type="button">Enviar mensaje</button>
    </form>
  </main>
</body>
</html>
