<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Banner Promocional</title>
<!-- Bootstrap CSS -->
<link href="/css/bootstrap.min.css" rel="stylesheet">
<style>
    #banner {
    color: white;
    text-align: center;
    padding: 30px;
    font-size: 24px;
    transition: background-color 0.3s ease;
    }
</style>
</head>
<body>

<div id="banner" class="bg-warning">
    ¡Promoción del día: 50% de descuento!
</div>

<div class="text-center mt-4">
    <button onclick="cambiarColor()" class="btn btn-primary">
    Cambiar Promoción
    </button>
</div>

<script>
    function cambiarColor() {
    const banner = document.getElementById("banner");

      // Lista de clases de fondo de Bootstrap (puedes agregar más)
    const colores = ["bg-warning", "bg-success", "bg-info", "bg-danger", "bg-primary"];
    
      // Obtener el color actual
    const colorActual = banner.classList.value.split(' ').find(clase => clase.startsWith('bg-'));

      // Obtener índice del color actual en el array
    let indiceActual = colores.indexOf(colorActual);

      // Calcular siguiente índice
    let siguienteIndice = (indiceActual + 1) % colores.length;

      // Remover clase actual y agregar la nueva
    banner.classList.remove(colorActual);
    banner.classList.add(colores[siguienteIndice]);
    }
  </script>

</body>
</html>
