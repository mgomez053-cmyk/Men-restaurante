<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ejemplo con classList</title>
<style>
    #miDiv {
    padding: 20px;
    margin: 20px;
    text-align: center;
    transition: all 0.3s ease;
    }

    .bg-primary {
    background-color: blue;
    }

    .text-white {
    color: white;
    }

    .border {
    border: 2px solid red;
    }
</style>
</head>
<body>

<div id="miDiv">¡Hola, soy un div!</div>
<button id="btn">Alternar Borde</button>

<script>
    const div = document.getElementById('miDiv');
    const button = document.getElementById('btn');

    // Al cargar, se añaden estas clases permanentemente
    div.classList.add('bg-primary', 'text-white');

    // Alternar la clase "border" al hacer clic
    button.addEventListener('click', () => {
    div.classList.toggle('border');
    });
</script>

</body>
</html>
