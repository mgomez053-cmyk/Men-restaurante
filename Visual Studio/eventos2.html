<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Card Interactiva con Alternancia</title>
<!-- Bootstrap CSS (CDN) -->
<link
href="css/bootstrap.min.css" rel="stylesheet"
/>
</head>
<body class="p-5">

<!-- ✅ Botón -->
<button id="cambiarContenido" class="btn btn-primary mb-4">Cambiar contenido</button>

<!-- ✅ Card de Bootstrap -->
<div class="card" style="width: 18rem;">
    <img
    id="cardImagen"
    src="antojito.jpg"
    class="card-img-top"
    alt="Imagen inicial"
    />
    <div class="card-body">
    <h5 id="cardTitulo" class="card-title">Título original</h5>
    <p id="cardTexto" class="card-text">
        Este es el texto original de la card.
    </p>
    </div>
</div>

<!-- ✅ JavaScript -->
<script>
    // Captura de elementos
    const boton = document.getElementById("cambiarContenido");
    const tituloCard = document.getElementById("cardTitulo");
    const textoCard = document.getElementById("cardTexto");
    const imagenCard = document.getElementById("cardImagen");

    // Estado para alternar
    let cambiado = false;

    // Evento click con alternancia
    boton.addEventListener("click", function () {
    if (!cambiado) {
        // Cambiar a contenido nuevo
        tituloCard.textContent = "Pozole";
        textoCard.textContent = "¡El contenido ha sido actualizado con JavaScript!";
        imagenCard.src = "enchiladas.jpg";
    } else {
        // Volver al contenido original
        tituloCard.textContent = "Pambazos";
        textoCard.textContent = "Este es el texto original de la card.";
        imagenCard.src = "sopes.jpg";
    }

      // Alternar el estado
    cambiado = !cambiado;
    });
</script>

</body>
</html>
